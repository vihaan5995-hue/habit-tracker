<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1.5rem 1rem}
  .wrap{max-width:520px;margin:0 auto}
  button{font-family:inherit;font-size:13px;padding:7px 14px;border:0.5px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;color:#1a1a1a;transition:background 0.15s}
  button:hover{background:#f0f0ee}
  button:disabled{opacity:0.5;cursor:default}
  input[type=text]{font-family:inherit;font-size:14px;width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;outline:none;background:#fff;color:#1a1a1a}
  input[type=text]:focus{border-color:#888}
  .nav{display:flex;gap:4px;margin-bottom:1.5rem;background:#eee;border-radius:8px;padding:4px}
  .nav button{flex:1;padding:6px 0;border:none;background:transparent;border-radius:6px;font-weight:400;color:#555}
  .nav button.active{background:#fff;border:0.5px solid #ccc;font-weight:500;color:#1a1a1a}
  .card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:12px 14px;margin-bottom:8px}
  .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
  .metric{background:#eee;border-radius:8px;padding:1rem;text-align:center}
  .metric .label{font-size:13px;color:#666;margin-bottom:4px}
  .metric .val{font-size:24px;font-weight:500}
  .prog-bar{height:6px;background:#e0e0e0;border-radius:4px;margin-bottom:1.5rem;overflow:hidden}
  .prog-fill{height:100%;background:#7F77DD;border-radius:4px;transition:width 0.4s}
  .habit-row{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
  .check{width:22px;height:22px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
  .del-btn{background:none;border:none;cursor:pointer;padding:2px 4px;color:#aaa;font-size:18px;line-height:1;margin-left:auto}
  .del-btn:hover{color:#e24b4a;background:none}
  .streak{font-size:12px;color:#888;margin-top:2px}
  .add-panel{background:#fff;border:0.5px solid #bbb;border-radius:12px;padding:1rem;margin-bottom:1rem}
  .color-row{display:flex;gap:6px;margin:10px 0}
  .swatch{width:20px;height:20px;border-radius:50%;cursor:pointer}
  .dashed{width:100%;padding:10px 0;font-size:13px;color:#888;border-style:dashed;background:transparent}
  .week-days{display:flex;gap:4px;margin-bottom:1.25rem;justify-content:space-between}
  .week-days .day{flex:1;text-align:center}
  .day-lbl{font-size:11px;color:#aaa;margin-bottom:3px}
  .day-num{font-size:11px;color:#888}
  .day-num.today{color:#378ADD;font-weight:500}
  .heat-row{display:flex;gap:4px;margin-top:8px}
  .heat-cell{flex:1;height:32px;border-radius:4px;transition:background 0.2s}
  .rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .rate-card{background:#f5f5f3;border-radius:6px;padding:8px 10px;text-align:center}
  .rate-lbl{font-size:11px;color:#888}
  .rate-val{font-size:18px;font-weight:500}
  .rate-val.good{color:#3B6D11}
  .rate-val.ok{color:#854F0B}
  .rate-val.bad{color:#A32D2D}
  .mini-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-top:8px;overflow:hidden}
  .mini-fill{height:100%;border-radius:2px;transition:width 0.4s}
  .ai-box{margin-top:1.5rem}
  .ai-text{font-size:14px;color:#555;line-height:1.7}
  .reminder{background:#e6f1fb;color:#185FA5;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem}
  h2{font-size:18px;font-weight:500;margin-bottom:4px}
  .sub{font-size:13px;color:#888;margin-bottom:1.5rem}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
  @media(prefers-color-scheme:dark){
    body{background:#1a1a1a;color:#e8e8e6}
    button{background:#2c2c2a;border-color:#444;color:#e8e8e6}
    button:hover{background:#383836}
    input[type=text]{background:#2c2c2a;border-color:#444;color:#e8e8e6}
    .nav{background:#2c2c2a}
    .nav button{color:#aaa}
    .nav button.active{background:#1a1a1a;border-color:#555;color:#e8e8e6}
    .card{background:#2c2c2a;border-color:#444}
    .metric{background:#2c2c2a}
    .metric .label{color:#999}
    .prog-bar{background:#3a3a38}
    .add-panel{background:#2c2c2a;border-color:#555}
    .day-lbl{color:#666}
    .day-num{color:#aaa}
    .rate-card{background:#2c2c2a}
    .ai-text{color:#aaa}
    .reminder{background:#0c447c;color:#85B7EB}
    .dashed{color:#888}
    .streak{color:#777}
    .sub{color:#888}
    .heat-cell{border-color:#555 !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h2>My habits</h2>
      <div class="sub" id="dateLabel"></div>
    </div>
    <button onclick="remind()">Remind me</button>
  </div>

  <div id="reminderMsg" style="display:none"></div>

  <div class="nav">
    <button class="active" onclick="switchView('today',this)">Today</button>
    <button onclick="switchView('week',this)">Week</button>
    <button onclick="switchView('progress',this)">Progress</button>
  </div>

  <div id="view-today"></div>
  <div id="view-week" style="display:none"></div>
  <div id="view-progress" style="display:none"></div>
</div>

<script>
const COLORS=["#7F77DD","#1D9E75","#D85A30","#D4537E","#378ADD","#639922","#BA7517","#E24B4A"];
let habits=[], logs={}, currentView='today';

function todayStr(){return new Date().toISOString().split('T')[0]}
function dateStr(offset){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().split('T')[0]}
function getLast7(){return Array.from({length:7},(_,i)=>dateStr(i-6))}
function getLast30(){return Array.from({length:30},(_,i)=>dateStr(i-29))}
function shortDay(s){return new Date(s+'T12:00:00').toLocaleDateString('en',{weekday:'short'}).slice(0,1)}
function fmtDate(s){return new Date(s+'T12:00:00').toLocaleDateString('en',{month:'short',day:'numeric'})}
function calcStreak(hid){let s=0,d=new Date();while(true){const k=d.toISOString().split('T')[0];if(logs[k]?.[hid])s++;else break;d.setDate(d.getDate()-1);}return s}
function calcRate(hid,days){const dates=Array.from({length:days},(_,i)=>dateStr(i-days+1));return Math.round(dates.filter(d=>logs[d]?.[hid]).length/days*100)}

function save(){localStorage.setItem('ht-data',JSON.stringify({habits,logs}))}
function load(){
  const raw=localStorage.getItem('ht-data');
  if(raw){const d=JSON.parse(raw);habits=d.habits||[];logs=d.logs||{};}
  else{habits=[{id:'h1',name:'Morning meditation',color:COLORS[0]},{id:'h2',name:'Exercise',color:COLORS[1]},{id:'h3',name:'Read for 20 min',color:COLORS[2]}];logs={};}
}

function toggle(hid){
  const t=todayStr();
  if(!logs[t])logs[t]={};
  logs[t][hid]=!logs[t][hid];
  save(); render();
}
function addHabit(){
  const n=document.getElementById('newName').value.trim();
  const c=document.getElementById('pickedColor').value;
  if(!n)return;
  habits.push({id:'h'+Date.now(),name:n,color:c});
  save(); document.getElementById('addPanel').style.display='none';
  document.getElementById('newName').value='';
  render();
}
function deleteHabit(id){habits=habits.filter(h=>h.id!==id);save();render()}

function remind(){
  const t=todayStr();
  const inc=habits.filter(h=>!logs[t]?.[h.id]).map(h=>h.name);
  const el=document.getElementById('reminderMsg');
  el.className='reminder';
  el.textContent=inc.length===0?'You\'ve completed all habits today! 🎉':'Pending today: '+inc.join(', ');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',5000);
}

function switchView(v, btn){
  currentView=v;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['today','week','progress'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===v?'block':'none';
  });
  render();
}

function render(){
  document.getElementById('dateLabel').textContent=new Date().toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'});
  if(currentView==='today') renderToday();
  if(currentView==='week') renderWeek();
  if(currentView==='progress') renderProgress();
}

function renderToday(){
  const t=todayStr();
  const done=habits.filter(h=>logs[t]?.[h.id]).length;
  const pct=habits.length?Math.round(done/habits.length*100):0;
  let html=`<div class="metric-grid">
    <div class="metric"><div class="label">Done today</div><div class="val">${done}/${habits.length}</div></div>
    <div class="metric"><div class="label">Completion</div><div class="val">${pct}%</div></div>
  </div>
  <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>`;

  habits.forEach(h=>{
    const ck=!!logs[t]?.[h.id];
    const streak=calcStreak(h.id);
    html+=`<div class="card habit-row" onclick="toggle('${h.id}')">
      <div class="check" style="border-color:${h.color};background:${ck?h.color:'transparent'}">
        ${ck?'<svg width="11" height="9" viewBox="0 0 11 9"><polyline points="1,5 4,8 10,1" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
      </div>
      <div style="flex:1">
        <div style="font-size:15px;text-decoration:${ck?'line-through':'none'};color:var(--color-text)">${h.name}</div>
        ${streak>0?`<div class="streak">${streak} day streak</div>`:''}
      </div>
      <button class="del-btn" onclick="event.stopPropagation();deleteHabit('${h.id}')">×</button>
    </div>`;
  });

  html+=`<div id="addPanel" style="display:none" class="add-panel">
    <input type="text" id="newName" placeholder="Habit name…" onkeydown="if(event.key==='Enter')addHabit()">
    <div class="color-row" id="colorRow"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button onclick="addHabit()" style="flex:1">Add habit</button>
      <button onclick="document.getElementById('addPanel').style.display='none'">Cancel</button>
    </div>
  </div>
  <button class="dashed" onclick="document.getElementById('addPanel').style.display='block';renderSwatches()">+ Add habit</button>`;

  document.getElementById('view-today').innerHTML=html;
}

function renderSwatches(){
  const row=document.getElementById('colorRow');
  if(!row)return;
  let picked=COLORS[0];
  const inp=document.createElement('input');inp.type='hidden';inp.id='pickedColor';inp.value=picked;row.parentNode.appendChild(inp);
  row.innerHTML=COLORS.map(c=>`<div class="swatch" style="background:${c};outline:${c===picked?'2px solid #555':'none'};outline-offset:2px" onclick="pickColor('${c}')"></div>`).join('');
}
function pickColor(c){
  document.getElementById('pickedColor').value=c;
  document.querySelectorAll('.swatch').forEach(s=>{s.style.outline=s.style.background===c?'2px solid #555':'none';});
}

function renderWeek(){
  const last7=getLast7(); const t=todayStr();
  let html=`<div class="week-days">`;
  last7.forEach(d=>{html+=`<div class="day"><div class="day-lbl">${shortDay(d)}</div><div class="day-num${d===t?' today':''}">${fmtDate(d).split(' ')[1]}</div></div>`;});
  html+=`</div>`;
  habits.forEach(h=>{
    html+=`<div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:8px">${h.name}</div><div class="heat-row">`;
    last7.forEach(d=>{
      const ck=!!logs[d]?.[h.id];
      const isToday=d===t;
      html+=`<div class="heat-cell" style="background:${ck?h.color:'#f0f0ee'};opacity:${ck?1:0.5};border:${isToday?`1.5px solid ${h.color}`:'0.5px solid #ddd'}"></div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('view-week').innerHTML=html;
}

function renderProgress(){
  let html='';
  habits.forEach(h=>{
    const streak=calcStreak(h.id);
    const r7=calcRate(h.id,7);
    const r30=calcRate(h.id,30);
    const cls=v=>v>=70?'good':v>=40?'ok':'bad';
    html+=`<div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="width:10px;height:10px;border-radius:50%;background:${h.color};flex-shrink:0"></div>
        <div style="font-size:15px;font-weight:500">${h.name}</div>
        ${streak>0?`<div style="margin-left:auto;font-size:12px;color:#888">${streak}d streak</div>`:''}
      </div>
      <div class="rate-grid">
        <div class="rate-card"><div class="rate-lbl">7-day rate</div><div class="rate-val ${cls(r7)}">${r7}%</div></div>
        <div class="rate-card"><div class="rate-lbl">30-day rate</div><div class="rate-val ${cls(r30)}">${r30}%</div></div>
      </div>
      <div class="mini-bar"><div class="mini-fill" style="width:${r30}%;background:${h.color}"></div></div>
    </div>`;
  });

  document.getElementById('view-progress').innerHTML=html;
}



load(); render();
</script>
</body>
</html>
